<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — dewviko</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans Thai', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #F8F9FA;
      color: #333;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 480px; }
    .code { font-size: 6rem; font-weight: 900; color: #2D6B2D; line-height: 1; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 12px; }
    p { color: #6B7280; margin-bottom: 32px; line-height: 1.7; }
    a {
      display: inline-block;
      background: #2D6B2D;
      color: #fff;
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    a:hover { background: #3A8A3A; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>ไม่เจอหน้านี้</h1>
    <p>หน้าที่กำลังหาอาจถูกย้ายหรือไม่มีอยู่แล้ว</p>
    <a href="/">กลับหน้าแรก</a>
  </div>
</body>
</html>
