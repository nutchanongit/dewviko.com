<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; display: flex; align-items: center; justify-content: center; background: #FFFFFF; font-family: 'Noto Sans Thai', Arial, sans-serif; }
  .card { width: 1200px; height: 630px; display: flex; align-items: center; padding: 80px; gap: 60px; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; width: 8px; height: 100%; background: #2D6B2D; }
  .text { flex: 1; }
  .logo { font-size: 1.2rem; font-weight: 900; color: #000; margin-bottom: 24px; letter-spacing: -0.02em; }
  .logo span { color: #2D6B2D; }
  h1 { font-size: 3.2rem; font-weight: 900; color: #000; line-height: 1.25; margin-bottom: 20px; }
  h1 span { color: #2D6B2D; }
  p { font-size: 1.35rem; color: #6B7280; line-height: 1.6; }
  .tags { display: flex; gap: 10px; margin-top: 28px; }
  .tag { background: #EEFBEE; color: #2D6B2D; padding: 8px 18px; border-radius: 50px; font-size: 0.9rem; font-weight: 700; }
  .photo { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; border: 4px solid #EEFBEE; }
  .url { position: absolute; bottom: 32px; right: 80px; font-size: 1rem; color: #6B7280; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div class="text">
    <div class="logo">dew<span>viko</span></div>
    <h1>ช่วยธุรกิจเพื่อนๆ<br>ใช้ <span>AI</span> ได้จริง</h1>
    <p>AI Consultant & Educator</p>
    <div class="tags">
      <span class="tag">Consulting</span>
      <span class="tag">Automation</span>
      <span class="tag">Education</span>
    </div>
  </div>
  <img src="landing_vdo_factory/img/myimg2.png" class="photo" alt="Dew">
  <span class="url">dewviko.com</span>
</div>
</body></html>
